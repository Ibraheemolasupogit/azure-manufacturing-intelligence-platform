name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install package and development dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Validate repository structure
        run: python scripts/check_structure.py

      - name: Check formatting
        run: ruff format --check .

      - name: Lint
        run: ruff check .

      - name: Type check
        run: mypy

      - name: Test
        run: pytest

      - name: Run CI ingestion
        run: make ingest-ci

      - name: Validate CI ingestion
        run: python -m manufacturing_intelligence.ingestion --config configs/ingestion_ci.yaml --validate-existing-run --output-directory .generated/ci/interim

      - name: Run CI forecast
        run: make forecast-ci

      - name: Validate CI forecast
        run: python -m manufacturing_intelligence.forecasting --config configs/forecasting_ci.yaml --validate-existing-run --output-directory .generated/ci/forecasting

      - name: Run CI inventory intelligence
        run: make inventory-ci

      - name: Validate CI inventory intelligence
        run: python -m manufacturing_intelligence.inventory --config configs/inventory_ci.yaml --validate-existing-run --output-directory .generated/ci/inventory

      - name: Run CI quality analytics
        run: make quality-analytics-ci

      - name: Validate CI quality analytics
        run: python -m manufacturing_intelligence.quality --config configs/quality_ci.yaml --validate-existing-run --output-directory .generated/ci/quality

      - name: Run CI predictive maintenance
        run: make maintenance-ci

      - name: Validate CI predictive maintenance
        run: python -m manufacturing_intelligence.maintenance --config configs/maintenance_ci.yaml --validate-existing-run --output-directory .generated/ci/maintenance

      - name: Clean generated CI outputs
        run: rm -rf .generated
